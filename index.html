<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen">
        <h1>Quiz Settings</h1>
        <select id="modeSelect" onchange="toggleTeamDropdown()">
            <option value="solo">Single Player</option>
            <option value="teams">Multi-Team (Classroom)</option>
        </select>
        <div id="team-dropdown-area" class="hidden">
            <select id="teamCountSelect">
                <option value="2">2 Teams</option>
                <option value="3">3 Teams</option>
                <option value="4">4 Teams</option>
            </select>
        </div>
        <select id="moduleSelect"><option value="TA">TA</option><option value="T1">T1</option><option value="T2">T2</option><option value="T3">T3</option><option value="T4">T4</option><option value="T5">T5</option><option value="T6">T6</option></select>
        <select id="testSelect"><option value="Test 1">Test 1</option><option value="Test 2">Test 2</option><option value="Test 3">Test 3</option><option value="Test 4">Test 4</option></select>
        <button onclick="loadAndStart()">Start Game</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="timer-display"></div>
        <div id="score-display" style="font-weight:bold; font-size:20px;">Score: 0</div>
        <h2 id="q-text"></h2>
        <div id="scoreboard"></div>
        <div id="media-container"></div>
        <div id="options-area"></div>

        <div id="final-results" class="hidden">
            <div id="results-text"></div> 
            
            <!-- Badge Container -->
            <div id="badge-display-area"></div>
            <hr>

            <!-- Seção exclusiva para Single Player -->
            <div id="single-player-controls">
                <p style="font-style: italic; color: #555;">Take a screenshot of your badge to show your teacher!</p>
            </div>

            <button id="menu-btn" onclick="location.reload()">Back to Menu</button>
        </div>
    </div>

    <!-- Importa o arquivo JavaScript -->
    <script src="game.js"></script>
</body>
</html>
