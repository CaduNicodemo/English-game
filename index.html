<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Quiz</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .hidden { display: none; }
        .team-box { display: inline-block; border: 2px solid #333; padding: 10px; margin: 5px; width: 100px; }
        button { padding: 15px; margin: 10px; cursor: pointer; display: block; width: 80%; margin: 10px auto; font-size: 18px; }
        .correct { background-color: #90EE90 !important; }
        .wrong { background-color: #FF7F7F !important; }
        select { padding: 10px; font-size: 16px; margin: 10px; width: 80%; }
    </style>
</head>
<body>
    <div id="setup-screen">
        <h1>English Learning Quiz</h1>
        <button onclick="showConfig()">Start Game</button>
    </div>

    <div id="config-screen" class="hidden">
        <h1>Settings</h1>
        <select id="modeSelect" onchange="toggleTeamDropdown()">
            <option value="solo">Single Player</option>
            <option value="teams">Multi-Team (Classroom)</option>
        </select>
        <div id="team-dropdown-area" class="hidden">
            <select id="teamCountSelect">
                <option value="2">2 Teams</option><option value="3">3 Teams</option><option value="4">4 Teams</option>
            </select>
        </div>
        <select id="moduleSelect">
            <option value="TA">TA</option><option value="T1">T1</option>
            <option value="T2">T2</option><option value="T3">T3</option>
            <option value="T4">T4</option><option value="T5">T5</option>
            <option value="T6">T6</option>
        </select>
        <select id="testSelect">
            <option value="Test 1">Test 1</option><option value="Test 2">Test 2</option>
            <option value="Test 3">Test 3</option><option value="Test 4">Test 4</option>
        </select>
        <button onclick="loadAndStart()">Start Quiz</button>
    </div>

    <div id="game-screen" class="hidden">
        <h2 id="display-info"></h2>
        <div id="scoreboard"></div>
        <div id="question-area">
            <h3 id="q-text"></h3>
            <div id="options-area"></div>
        </div>
        <button onclick="location.reload()">Back to Menu</button>
    </div>

    <script>
        let fullQuestionData = {};
        let currentQuestions = [];
        let currentIndex = 0;

        // Load the external JSON file
        async function loadAndStart() {
            try {
                let response = await fetch('./questions.json');
                fullQuestionData = await response.json();
                initGame();
            } catch (e) {
                alert("Could not load questions.json. Ensure it's in the same folder.");
            }
        }

        function initGame() {
            let mod = document.getElementById('moduleSelect').value;
            let test = document.getElementById('testSelect').value;
            currentQuestions = fullQuestionData[mod]?.[test] || [];
            
            document.getElementById('config-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            if (document.getElementById('modeSelect').value === 'teams') {
                let num = document.getElementById('teamCountSelect').value;
                for(let i = 1; i <= num; i++) {
                    document.getElementById('scoreboard').innerHTML += `<div class="team-box">T${i}: <span id="s${i}">0</span><br><button onclick="addPoint(${i})" style="width:100%">+1</button></div>`;
                }
            } else {
                loadSoloQuestion();
            }
        }

        // Logic for loading/checking questions remains same as before...
        function loadSoloQuestion() {
            if (currentIndex >= currentQuestions.length) { 
                document.getElementById('q-text').innerText = "Quiz Complete!"; 
                document.getElementById('options-area').innerHTML = "";
                return; 
            }
            let q = currentQuestions[currentIndex];
            document.getElementById('q-text').innerText = q.q;
            let area = document.getElementById('options-area');
            area.innerHTML = "";
            q.options.forEach(opt => {
                let btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = (e) => checkAnswer(e.target, opt, q.answer);
                area.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            if (selected === correct) {
                btn.classList.add('correct');
                setTimeout(() => { currentIndex++; loadSoloQuestion(); }, 1000);
            } else {
                btn.classList.add('wrong');
            }
        }

        function addPoint(teamNum) {
            let scoreEl = document.getElementById('s'+teamNum);
            scoreEl.innerText = parseInt(scoreEl.innerText) + 1;
        }

        function showConfig() { document.getElementById('setup-screen').classList.add('hidden'); document.getElementById('config-screen').classList.remove('hidden'); }
        function toggleTeamDropdown() { document.getElementById('team-dropdown-area').style.display = (document.getElementById('modeSelect').value === 'teams') ? 'block' : 'none'; }
    </script>
</body>
</html>
